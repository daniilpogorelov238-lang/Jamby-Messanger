<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamby — Современный мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6b4eff;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0ff;
            background: #0a0814;
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a0033, #0a0a2e, #001a33);
            animation: gradientShift 25s ease infinite;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .logo-img {
            width: 160px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .screenshots {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding: 30px 0;
        }

        .screenshot {
            border-radius: 28px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7);
            min-width: 320px;
            transition: 0.4s;
        }

        .screenshot:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header style="background: rgba(10,8,25,0.95); backdrop-filter: blur(16px); padding: 18px 5%; position: fixed; width: 100%; z-index: 1000;">
        <div style="font-size: 34px; font-weight: 800;">Jamby</div>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="glass" style="padding: 50px 40px; max-width: 860px; z-index: 2;">
            <img src="IMG_20260522_185421_430.jpg" alt="Jamby Logo" class="logo-img">
            <h1 style="font-size: 5.6rem; margin: 25px 0 20px;">Jamby</h1>
            <p style="font-size: 1.85rem; margin-bottom: 45px;">Мессенджер нового поколения</p>

            <button onclick="startDownload()" 
                    style="background: linear-gradient(45deg, #6b4eff, #9b7eff); color: white; padding: 24px 80px; font-size: 1.65rem; font-weight: 700; border: none; border-radius: 60px; cursor: pointer;">
                <i class="fas fa-download"></i> Скачать сейчас
            </button>
        </div>
    </section>

    <!-- Скриншоты -->
    <section style="padding: 110px 5%; background: #0a0814;">
        <h2 style="text-align: center; font-size: 3.3rem; margin-bottom: 70px;">Как выглядит Jamby</h2>
        <div class="screenshots">
            <img src="IMG_20260522_185424_912.jpg" alt="Безопасность" class="screenshot">
            <img src="IMG_20260522_185425_225.jpg" alt="Профиль" class="screenshot">
            <img src="IMG_20260522_185424_780.jpg" alt="Лента" class="screenshot">
        </div>
    </section>

    <footer style="background: #08060f; padding: 100px 5% 60px; text-align: center;">
        <p>© 2026 Jamby Messenger</p>
        <p style="margin-top: 15px;">
            Канал: <a href="https://t.me/Jamby_messenger" target="_blank" style="color: #a78bff;">t.me/Jamby_messenger</a>
        </p>
    </footer>

    <script>
        function startDownload() {
            window.open("https://t.me/Jamby_messenger/410", "_blank");
        }
    </script>
</body>
</html>
