<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamby — Современный мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6b4eff;
            --glass: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0ff;
            overflow-x: hidden;
            background: #0a0814;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a0033, #0a0a2e, #001a33);
            animation: gradientShift 25s ease infinite;
            z-index: 1;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(107,78,255,0.25) 0%, transparent 60%);
            animation: pulse 20s ease infinite;
        }

        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .logo-img {
            width: 150px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .screenshots {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding: 30px 0;
            scrollbar-width: thin;
        }

        .screenshot {
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            min-width: 320px;
            transition: 0.4s;
        }

        .screenshot:hover { transform: scale(1.04); }
    </style>
</head>
<body>

    <header style="background: rgba(10,8,25,0.95); backdrop-filter: blur(16px); padding: 18px 5%; position: fixed; width: 100%; z-index: 100;">
        <div style="font-size: 32px; font-weight: 800;">Jamby</div>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content glass" style="padding: 50px 40px; max-width: 850px; z-index: 2;">
            <img src="logo.png" alt="Jamby Logo" class="logo-img">
            <h1 style="font-size: 5.5rem; margin: 20px 0 15px;">Jamby</h1>
            <p style="font-size: 1.8rem; margin-bottom: 40px;">Мессенджер нового поколения</p>

            <div style="margin: 40px 0;">
                <button style="padding:16px 34px; background:var(--glass); border:1px solid var(--border); color:white; border-radius:50px; margin:0 8px;"><i class="fab fa-windows"></i> Windows</button>
                <button style="padding:16px 34px; background:var(--glass); border:1px solid var(--border); color:white; border-radius:50px; margin:0 8px;"><i class="fab fa-android"></i> Android</button>
                <button style="padding:16px 34px; background:var(--glass); border:1px solid var(--border); color:white; border-radius:50px; margin:0 8px;"><i class="fab fa-apple"></i> macOS</button>
            </div>

            <button onclick="startDownload()" style="background:linear-gradient(45deg,#6b4eff,#9b7eff); color:white; padding:22px 75px; font-size:1.6rem; font-weight:700; border:none; border-radius:60px; cursor:pointer;">
                <i class="fas fa-download"></i> Скачать сейчас
            </button>
        </div>
    </section>

    <!-- Скриншоты -->
    <section style="padding: 100px 5%; background: #0a0814;">
        <h2 style="text-align:center; font-size: 3.2rem; margin-bottom: 60px;">Как выглядит Jamby</h2>
        <div class="screenshots">
            <img src="screen1.jpg" alt="Безопасность" class="screenshot">
            <img src="screen2.jpg" alt="Профиль" class="screenshot">
            <img src="screen3.jpg" alt="Лента" class="screenshot">
        </div>
    </section>

    <section id="features" style="padding: 120px 5%; background: linear-gradient(135deg, #0f0a2e, #1a0033);">
        <h2 style="text-align:center; font-size: 3.3rem; margin-bottom: 80px;">Почему Jamby?</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 35px;">
            <div class="glass" style="padding: 48px 35px; text-align: center;">
                <i class="fas fa-bolt" style="font-size: 3.6rem; color: #a78bff; margin-bottom: 25px;"></i>
                <h3>Мгновенная скорость</h3>
                <p>Сообщения и звонки летят мгновенно</p>
            </div>
            <div class="glass" style="padding: 48px 35px; text-align: center;">
                <i class="fas fa-shield-alt" style="font-size: 3.6rem; color: #a78bff; margin-bottom: 25px;"></i>
                <h3>Полная приватность</h3>
                <p>Сквозное шифрование</p>
            </div>
            <div class="glass" style="padding: 48px 35px; text-align: center;">
                <i class="fas fa-palette" style="font-size: 3.6rem; color: #a78bff; margin-bottom: 25px;"></i>
                <h3>Красивый дизайн</h3>
                <p>Жидкое стекло и плавные анимации</p>
            </div>
        </div>
    </section>

    <footer style="background: #0a0814; padding: 90px 5% 60px; text-align: center;">
        <p>© 2026 Jamby Messenger</p>
        <p style="margin-top: 15px;">
            Канал: <a href="https://t.me/Jamby_messenger" target="_blank" style="color: #a78bff;">t.me/Jamby_messenger</a>
        </p>
    </footer>

    <script>
        function startDownload() {
            window.open("https://t.me/Jamby_messenger/410", "_blank");
        }
    </script>
</body>
</html>
