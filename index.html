<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamby — Современный мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6b4eff;
            --bg: #0a0a14;
            --card: rgba(255,255,255,0.06);
            --text: #e0e0ff;
        }
        
        [data-theme="light"] {
            --bg: #f8f9fc;
            --card: rgba(0,0,0,0.06);
            --text: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.4s;
        }

        header {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        [data-theme="light"] header {
            background: rgba(255,255,255,0.95);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #6b4eff, #a78bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: linear-gradient(rgba(10,10,20,0.8), rgba(10,10,20,0.85)), 
                        url('https://images.unsplash.com/photo-1614624532983-4ce03382d63d?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover;
        }

        .hero-content {
            animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content h1 {
            font-size: 5.5rem;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.6rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .platforms {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .platform-btn {
            padding: 14px 28px;
            border: 2px solid rgba(107,78,255,0.3);
            background: transparent;
            color: var(--text);
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .platform-btn.active, .platform-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .download-btn {
            background: linear-gradient(45deg, var(--primary), #8b6eff);
            color: white;
            padding: 20px 65px;
            font-size: 1.5rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(107, 78, 255, 0.5);
            transition: all 0.4s;
            margin-top: 20px;
        }

        .download-btn:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 20px 50px rgba(107, 78, 255, 0.7);
        }

        section {
            padding: 110px 5%;
            animation: fadeUp 0.8s ease forwards;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
        }

        .feature-card {
            background: var(--card);
            padding: 45px 30px;
            border-radius: 24px;
            text-align: center;
            transition: all 0.4s;
        }

        .feature-card:hover {
            transform: translateY(-15px) scale(1.03);
        }

        footer {
            background: #08080f;
            padding: 70px 5% 40px;
            text-align: center;
        }

        [data-theme="light"] footer {
            background: #e8e8f0;
        }
    </style>
</head>
<body data-theme="dark">

    <header>
        <div class="logo">Jamby</div>
        <div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Jamby</h1>
            <p>Быстрый. Красивый. Приватный.</p>

            <div class="platforms" id="platforms">
                <button class="platform-btn active" data-platform="windows">
                    <i class="fab fa-windows"></i> Windows
                </button>
                <button class="platform-btn" data-platform="android">
                    <i class="fab fa-android"></i> Android
                </button>
                <button class="platform-btn" data-platform="mac">
                    <i class="fab fa-apple"></i> macOS
                </button>
            </div>

            <button class="download-btn" onclick="startDownload()">
                <i class="fas fa-download"></i> Скачать сейчас
            </button>
            
            <p style="margin-top: 25px; opacity: 0.8;">Автоматическое скачивание</p>
        </div>
    </section>

    <section id="features">
        <h2 style="text-align:center; margin-bottom:60px;">Возможности</h2>
        <div class="features">
            <div class="feature-card">
                <i class="fas fa-bolt" style="font-size:3rem; color:var(--primary); margin-bottom:20px;"></i>
                <h3>Молниеносная скорость</h3>
                <p>Мгновенная доставка сообщений</p>
            </div>
            <div class="feature-card">
                <i class="fas fa-shield-alt" style="font-size:3rem; color:var(--primary); margin-bottom:20px;"></i>
                <h3>Приватность</h3>
                <p>Надёжное шифрование</p>
            </div>
            <div class="feature-card">
                <i class="fas fa-palette" style="font-size:3rem; color:var(--primary); margin-bottom:20px;"></i>
                <h3>Стильный дизайн</h3>
                <p>Красивый интерфейс</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Jamby Messenger</p>
        <p style="margin-top: 15px;">
            Канал: <a href="https://t.me/Jamby_messenger" target="_blank" style="color:#7b9cff;">t.me/Jamby_messenger</a>
        </p>
    </footer>

    <script>
        // Темная / Светлая тема
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Меняем иконку
            const icon = document.querySelector('.theme-toggle i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        // Выбор платформы
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Автоматическое скачивание
        function startDownload() {
            const url = "https://t.me/Jamby_messenger/410";
            const link = document.createElement('a');
            link.href = url;
            link.target = "_blank";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Загрузка сохранённой темы
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.body.setAttribute('data-theme', savedTheme);
                if (savedTheme === 'light') {
                    document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
                }
            }
        };
    </script>
</body>
</html>
